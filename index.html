<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiro-chan | Japan Life Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&family=Noto+Sans+JP&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--red:#E63946;--dark:#0d0d0d;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;--fg:#fff;--gray:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:"Noto Sans","Noto Sans JP","Noto Sans Sinhala",sans-serif;background:var(--dark);color:var(--fg);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto;}
.hd{background:#111;border-bottom:2px solid var(--red);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.av-lg{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.av-lg img{width:100%;height:100%;object-fit:cover;object-position:center 10%;}
.ht h1{font-size:16px;font-weight:900;}
.ht p{font-size:10px;color:var(--gray);margin-top:1px;}
.dot{display:inline-block;width:7px;height:7px;background:#4caf50;border-radius:50%;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hbtns{margin-left:auto;display:flex;gap:7px;}
.ib{width:32px;height:32px;background:var(--card2);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--fg);transition:.2s;}
.ib:hover{background:var(--red);}
.lb-bar{background:#0f0f0f;border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.lb-bar::-webkit-scrollbar{display:none;}
.lb{background:var(--card2);border:1px solid var(--border);color:var(--gray);padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.2s;}
.lb.on,.lb:hover{background:var(--red);border-color:var(--red);color:#fff;}
.chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;max-width:92%;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;}
.msg.usr{align-self:flex-end;flex-direction:row-reverse;}
.av-sm{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px;}
.av-sm img{width:100%;height:100%;object-fit:cover;object-position:center 10%;}
.bbl{background:var(--card);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;padding:10px 14px;font-size:14px;line-height:1.7;word-break:break-word;}
.msg.usr .bbl{background:var(--red);border-color:var(--red);border-top-left-radius:16px;border-top-right-radius:4px;}
.bbl strong{font-weight:800;}
.utype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.utype-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:12px 10px;cursor:pointer;font-family:inherit;color:var(--fg);text-align:left;transition:all .2s;display:flex;align-items:flex-start;gap:10px;width:100%;}
.utype-btn:hover{border-color:var(--red);background:rgba(230,57,70,.08);}
.utype-icon{font-size:22px;flex-shrink:0;}
.utype-num{font-size:9px;color:var(--gray);font-weight:700;margin-bottom:2px;}
.utype-label{font-size:12px;font-weight:700;line-height:1.4;}
.utype-label small{font-weight:400;color:var(--gray);}
.qbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qb{background:var(--card2);border:1px solid var(--border);color:var(--fg);padding:7px 13px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;transition:.2s;}
.qb:hover{background:var(--red);border-color:var(--red);color:#fff;}
.tbbl{background:var(--card);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;padding:12px 14px;display:flex;align-items:center;gap:5px;}
.tbbl span{width:7px;height:7px;background:var(--gray);border-radius:50%;animation:bn 1.2s infinite;}
.tbbl span:nth-child(2){animation-delay:.2s}
.tbbl span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.em-box{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);border-radius:12px;padding:10px 12px;margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.em-box p{font-size:11px;color:#ff6b6b;font-weight:700;flex:1;}
.em-btn{background:var(--red);border:none;border-radius:20px;color:#fff;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
.inp-area{background:#111;border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.inp-wrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:22px;display:flex;align-items:flex-end;overflow:hidden;transition:.2s;}
.inp-wrap:focus-within{border-color:var(--red);}
textarea#inp{flex:1;background:transparent;border:none;color:var(--fg);font-size:13px;font-family:inherit;padding:10px 14px;resize:none;outline:none;max-height:100px;line-height:1.5;}
textarea#inp::placeholder{color:#444;}
.send{width:42px;height:42px;background:var(--red);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send svg{width:16px;height:16px;fill:white;}
</style>
</head>

  ja:[["&#x1F3E5;","&#x533B;&#x7642;"],["&#x1F3E6;","&#x9280;&#x884C;"],["&#x1F683;","&#x4EA4;&#x901A;"],["&#x1F3E0;","&#x4F4F;&#x5C45;"],["&#x1F4CB;","&#x30D3;&#x30B6;"],["&#x1F4BC;","&#x4ED5;&#x4E8B;&#x30FB;&#x7A0E;&#x91D1;"],["&#x1F6D2;","&#x65E5;&#x5E38;"],["&#x1F338;","&#x6587;&#x5316;"],["&#x1F6A8;","&#x7DCA;&#x6025;"]]
};

const PH = {en:"Ask me anything about life in Japan...",ja:"&#x65E5;&#x672C;&#x751F;&#x6D3B;&#x306B;&#x3064;&#x3044;&#x3066;...",si:"&#x0DA2;&#x0DB4;&#x0DCF;&#x0DB1;&#x0DBA;&#x0DDA; &#x0DA2;&#x0DD3;&#x0DC0;&#x0DD2;&#x0DAD;&#x0DBA; &#x0D9C;&#x0DD0;&#x0DB1; &#x0D94;&#x0DB1;&#x0DDA; &#x0D91;&#x0DBA; &#x0D85;&#x0DC4;&#x0DB1;&#x0DCA;&#x0DB1;..."};

let lang = "en", msgs = [], userType = null;

function avHtml(size) {
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:'+(size<35?2:0)+'px;background:#222;"><img src="'+AV_SRC+'" style="width:100%;height:100%;object-fit:cover;object-position:center 10%;" alt="Shiro-chan"></div>';
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
}

function addBot(html, extra) {
  extra = extra || "";
  var c = document.getElementById("chat");
  var d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = avHtml(30) + "<div><div class=\"bbl\">" + html + "</div>" + extra + "</div>";
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return d;
}

function addUser(t) {
  var c = document.getElementById("chat");
  var d = document.createElement("div");
  d.className = "msg usr";
  d.innerHTML = "<div class=\"bbl\">" + t + "</div>";
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  var c = document.getElementById("chat");
  var d = document.createElement("div");
  d.className = "msg bot"; d.id = "typ";
  d.innerHTML = avHtml(30) + "<div class=\"tbbl\"><span></span><span></span><span></span></div>";
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

function rmTyping() { var t = document.getElementById("typ"); if(t) t.remove(); }

function renderUtypes() {
  var types = UTYPES[lang] || UTYPES.en;
  var g = document.createElement("div");
  g.className = "utype-grid";
  types.forEach(function(ut, i) {
    var b = document.createElement("button");
    b.className = "utype-btn";
    b.innerHTML = "<div class=\"utype-icon\">" + ut.i + "</div><div><div class=\"utype-num\">0" + (i+1) + "</div><div class=\"utype-label\">" + ut.l + "</div></div>";
    b.onclick = (function(idx, u) { return function() { selectType(idx, u); }; })(i, ut);
    g.appendChild(b);
  });
  return g;
}

function renderQbs(parent) {
  var btns = QBTNS[lang] || QBTNS.en;
  var w = document.createElement("div");
  w.className = "qbs";
  btns.forEach(function(btn) {
    var b = document.createElement("button");
    b.className = "qb";
    b.innerHTML = btn[0] + " " + btn[1];
    b.onclick = (function(icon, label) { return function() { handleCat(icon, label); }; })(btn[0], btn[1]);
    w.appendChild(b);
  });
  parent.appendChild(w);
}

function selectType(idx, ut) {
  userType = idx;
  var plain = ut.l.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().split("(")[0].trim();
  addUser(ut.i + " " + plain);
  var typeNames = ["student (language school or university)", "technical intern / gino jisshusei / tokutei gino", "housewife or spouse visa holder", "work or other visa holder"];
  var prompt = "The user is a " + typeNames[idx] + " in Japan. Welcome them warmly. Explain what you can help them with. List 4-5 most important topics for their situation. Respond in language: " + lang;
  callGroq(prompt, true);
}

function handleCat(icon, label) {
  addUser(icon + " " + label);
  if(label === "Emergency" || label === "&#x0DC4;&#x0DAF;&#x0DD2;&#x0DC3;&#x0DD2;" || label === "&#x7DCA;&#x6025;") {
    addBot("<strong>&#x1F6A8; Emergency Numbers in Japan</strong><br><br>&#x1F691; <strong>119</strong> - Ambulance / Fire<br>&#x1F694; <strong>110</strong> - Police<br>&#x1F4DE; <strong>#7119</strong> - Medical consult<br><br><em>Say: Please send an ambulance. I am a foreigner.</em>",
      "<div class=\"em-box\"><p>Need help NOW?</p><a class=\"em-btn\" href=\"tel:119\">&#x1F4DE; 119</a><a class=\"em-btn\" href=\"tel:110\">&#x1F4DE; 110</a></div>");
    return;
  }
  var typeCtx = userType !== null ? ["as a student","as a technical intern","as a housewife/spouse","as a work visa holder"][userType] : "";
  var prompt = "Give comprehensive practical advice about " + label + " in Japan " + typeCtx + ". Respond in language: " + lang + ". Be specific and practical.";
  callGroq(prompt, false);
}

async function callGroq(prompt, showQbs) {
  showTyping();
  try {
    var allMsgs = [{role:"system",content:SYSTEM}].concat(msgs).concat([{role:"user",content:prompt}]).slice(-15);
    var res = await fetch("https://shirochan-api.zaranga20.workers.dev", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1024,system:SYSTEM,messages:msgs.concat([{role:"user",content:prompt}]).slice(-14)})
    });
    var data = await res.json();
    rmTyping();
    var reply = (data.content && data.content[0] && data.content[0].text) || (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content);
    if(!reply) throw new Error("empty: " + JSON.stringify(data));
    msgs.push({role:"assistant",content:reply});
    var d = addBot(fmt(reply));
    if(showQbs) renderQbs(d.querySelector("div:last-child"));
  } catch(e) {
    rmTyping();
    addBot("&#x26A0;&#xFE0F; Error: " + e.message);
  }
}

function sendMsg() {
  var inp = document.getElementById("inp");
  var t = inp.value.trim();
  if(!t) return;
  addUser(t);
  inp.value = ""; inp.style.height = "auto";
  msgs.push({role:"user",content:t});
  callGroq(t, false);
}

function handleKey(e) { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight,100) + "px"; }

function setL(l, btn) {
  lang = l;
  document.querySelectorAll(".lb").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  document.getElementById("inp").placeholder = PH[l] || PH.en;
  clearChat();
}

function clearChat() {
  msgs = []; userType = null;
  document.getElementById("chat").innerHTML = "";
  init();
}

function init() {
  var c = document.getElementById("chat");
  var d = document.createElement("div"); d.className = "msg bot";
  var inner = document.createElement("div");
  var bbl = document.createElement("div"); bbl.className = "bbl";
  bbl.innerHTML = fmt(WELCOME[lang] || WELCOME.en);
  inner.appendChild(bbl);
  inner.appendChild(renderUtypes());
  d.innerHTML = avHtml(30);
  d.appendChild(inner);
  c.appendChild(d);
}

window.onload = init;
</script>
</body>
</html>
